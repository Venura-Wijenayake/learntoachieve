name: Lighthouse CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Run Lighthouse against live site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Wait for Vercel auto-redeploy to settle
        run: |
          echo "Waiting 60s for Vercel deploy..."
          sleep 60

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://l2a.me/
            https://l2a.me/updates/
          uploadArtifacts: true
          temporaryPublicStorage: true
